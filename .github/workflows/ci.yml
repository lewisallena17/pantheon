name: CI

on:
  push:
    branches: [main, 'god/**']
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        # BLOCKING — used to be `|| echo warning` which let TS errors slip
        # through and silently break Vercel for 3 commits in a row. We
        # tolerate ONE long-standing noisy file via grep so unrelated
        # work isn't held hostage to it.
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tee /tmp/tsc.log || true
          if grep -v 'scripts/batch-classify-with-audit-check.ts' /tmp/tsc.log | grep -E ': error '; then
            echo "::error::TypeScript errors above — failing CI"
            exit 1
          fi

      - name: Lint
        run: npm run lint || echo "::warning::Lint warnings present (non-blocking)"

      - name: Build
        # BLOCKING — catches build-time failures the typecheck misses
        # (route handler signatures, dynamic-import errors, etc).
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_URL:                  ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build

name: Nightly Supabase backup

on:
  schedule:
    # 04:00 UTC every day (low-traffic window)
    - cron: '0 4 * * *'
  workflow_dispatch: {}      # allow manual runs from the Actions tab

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # lets the action commit the backup file
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backup
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/backup-supabase.mjs

      - name: Commit snapshot
        run: |
          git config user.name  "pantheon-backup-bot"
          git config user.email "backup@autonomous.local"
          git add backups/
          if git diff --staged --quiet; then
            echo "No changes to commit — backup unchanged since last run"
          else
            git commit -m "chore(backup): nightly snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
